        <h1>CarbonFlow — Scope 3 Carbon Accounting &amp; BRSR Reporting Platform</h1>
        <p>
          CarbonFlow is a SaaS platform that helps companies measure, manage, and report
          <strong>Scope 3 supply chain carbon emissions</strong>. Collect emissions data
          from suppliers, calculate total CO₂ using GHG Protocol factors, and generate
          compliance-ready reports for <strong>BRSR, CDP, ESRS, and CBAM</strong>.
        </p>
        <h2>Key Capabilities</h2>
        <ul>
          <li>Supplier emissions data collection via secure submission links (no supplier login required)</li>
          <li>Scope 1, 2, and 3 emissions tracking and dashboards</li>
          <li>Automated CO₂ calculations from electricity, fuel, and transport activity</li>
          <li>One-click BRSR, CDP, and ESRS disclosure exports</li>
          <li>Downloadable PDF emissions reports with supplier-level breakdown</li>
          <li>Free forever for Indian registered companies</li>
        </ul>
        <h2>Who It's For</h2>
        <p>
          Sustainability teams, ESG leads, and compliance officers at Indian and global
          companies that need to report supply chain (Scope 3) emissions.
